services:
  api:
    image: ghcr.io/saleor/saleor:latest
    ports:
      - "8000:8000"
    env_file:
      - .env.saleor
    environment:
      - DATABASE_URL=postgres://saleor:saleor@db:5432/saleor
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
      - ALLOWED_CLIENT_HOSTS=localhost:3000,localhost,127.0.0.1
      - DEFAULT_CHANNEL_SLUG=default-channel
    volumes:
      - saleor_media:/app/media
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor
      POSTGRES_DB: saleor
    volumes:
      - saleor_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  saleor_db:
  saleor_media:
